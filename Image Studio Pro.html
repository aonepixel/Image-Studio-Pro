<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #0f0f11; color: #e4e4e7; }
        .canvas-container { position: relative; display: inline-block; max-width: 100%; max-height: 65vh; }
        
        /* Modern Mobile-Style Crop Box */
        .crop-box { 
            position: absolute; 
            border: 2px solid #3b82f6; 
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75); 
            cursor: move; 
            display: none; 
            transition: border-color 0.2s;
        }
        .crop-box:hover { border-color: #60a5fa; }
        
        /* Premium Drag Handles with hover scaling */
        .crop-handle { 
            position: absolute; 
            width: 14px; 
            height: 14px; 
            background: #3b82f6; 
            border: 2px solid #fff; 
            transition: transform 0.2s, background-color 0.2s;
        }
        .crop-handle:hover { transform: translate(-0px, -0px) scale(1.3); background-color: #60a5fa; }
        
        /* Perspective Handles */
        .p-handle { 
            position: absolute; 
            width: 16px; 
            height: 16px; 
            background: #ec4899; 
            border: 2px solid #fff; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            cursor: crosshair; 
            display: none; 
            z-index: 40; 
            transition: transform 0.2s;
        }
        .p-handle:hover { transform: translate(-50%, -50%) scale(1.4); background-color: #f43f5e; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#18181c] border-b border-zinc-800 px-6 py-3 flex items-center justify-between z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white font-black px-2.5 py-1 rounded text-sm tracking-tighter">PS</div>
            <h1 class="text-md font-bold tracking-wide text-zinc-100">Image Studio Proo</h1>
        </div>
        
        <div class="flex items-center gap-6 text-xs bg-zinc-900/90 px-5 py-2 rounded-full border border-zinc-800 shadow-inner">
            <div class="flex flex-col">
                <span class="text-zinc-500 font-medium">Original File</span>
                <span id="origStats" class="font-mono text-zinc-300">0x0 px • 0 KB</span>
            </div>
            <div class="text-zinc-700 text-lg">|</div>
            <div class="flex flex-col">
                <span class="text-blue-400 font-bold">Current Preview</span>
                <span id="currStats" class="font-mono font-bold text-blue-400">0x0 px • 0 KB</span>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button id="btnUndo" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-2 rounded-lg text-sm transition font-medium flex items-center gap-1.5 disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                <span>↺</span> Undo
            </button>
            <button id="btnDownload" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-md">Export JPG</button>
            <button id="btnPdf" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-md">Save PDF</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-[#18181c] border-r border-zinc-800 p-5 flex flex-col gap-6 overflow-y-auto">
            
            <div class="space-y-2">
                <label class="text-xs font-semibold text-zinc-400 tracking-wider uppercase">1. File Import</label>
                <label class="flex flex-col items-center justify-center border-2 border-dashed border-zinc-700 hover:border-blue-500 hover:bg-zinc-900/30 rounded-xl p-4 cursor-pointer transition group">
                    <span class="text-sm text-zinc-400 group-hover:text-zinc-200 transition">Choose or drop JPG</span>
                    <input type="file" id="upload" accept="image/jpeg, image/jpg" class="hidden">
                </label>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-semibold text-zinc-400 tracking-wider uppercase">2. Geometry & Crop</label>
                
                <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 space-y-2">
                    <div class="text-xs text-zinc-400 font-medium">Scale Proportions</div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="resizeW" placeholder="Width" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-sm text-white focus:outline-none focus:border-blue-500 font-mono">
                        <input type="number" id="resizeH" placeholder="Height" class="bg-zinc-800 border border-zinc-700 rounded-md px-2 py-1 text-sm text-white focus:outline-none focus:border-blue-500 font-mono">
                    </div>
                    <button id="btnResize" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-xs py-2 rounded-md font-medium transition active:scale-98">Apply Dimensions</button>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button id="toolCrop" class="bg-zinc-800 hover:bg-zinc-700 text-xs py-2.5 rounded-md border border-zinc-700 transition font-medium hover:border-blue-500 active:scale-95">
                        [ ] Phone Crop
                    </button>
                    <button id="toolPerspective" class="bg-zinc-800 hover:bg-zinc-700 text-xs py-2.5 rounded-md border border-zinc-700 transition font-medium hover:border-pink-500 active:scale-95">
                        ⧄ Perspective
                    </button>
                </div>
                
                <button id="applyCrop" class="w-full bg-blue-600 hover:bg-blue-500 text-xs py-2.5 rounded-md font-semibold hidden shadow-md transition animate-pulse">Commit Crop Layer</button>
                <button id="applyPerspective" class="w-full bg-pink-600 hover:bg-pink-500 text-xs py-2.5 rounded-md font-semibold hidden shadow-md transition animate-pulse">Warp Mesh Projection</button>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-semibold text-zinc-400 tracking-wider uppercase">3. Optimization & Compression</label>
                <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 space-y-3">
                    <div class="flex justify-between text-xs text-zinc-400 font-medium">
                        <span>JPEG Output Quality</span>
                        <span id="qualityVal" class="text-blue-400 font-bold">90%</span>
                    </div>
                    <input type="range" id="compressQuality" min="10" max="100" value="90" class="w-full accent-blue-500 cursor-pointer">
                    <button id="btnCompress" class="w-full bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-500/30 text-xs py-2 rounded-md font-semibold transition active:scale-98">
                        ⚡ Compress Image Data
                    </button>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-semibold text-zinc-400 tracking-wider uppercase">4. Background Magic</label>
                <button id="btnRemoveBg" class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-xs py-2 rounded-md font-medium transition flex items-center justify-center gap-1.5 active:scale-98">
                    ✨ Clear Light Backdrop
                </button>
                
                <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 space-y-2">
                    <div class="text-xs text-zinc-400 font-medium">Fill Custom Solid Color</div>
                    <div class="flex gap-2">
                        <input type="color" id="bgColor" value="#ffffff" class="w-10 h-8 rounded-md border-0 cursor-pointer bg-transparent">
                        <button id="btnAddBgColor" class="flex-1 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-xs rounded-md font-medium transition active:scale-98">Inject Solid Layer</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-[#111113] p-8 flex items-center justify-center overflow-auto relative">
            <div class="canvas-container" id="canvasWrapper">
                <canvas id="canvas" class="shadow-2xl border border-zinc-800 max-w-full max-h-full transition-shadow duration-300"></canvas>
                
                <div id="cropBox" class="crop-box">
                    <div class="crop-handle top-0 left-0 -translate-x-1/2 -translate-y-1/2 cursor-nwse-resize" data-handle="nw"></div>
                    <div class="crop-handle top-0 right-0 translate-x-1/2 -translate-y-1/2 cursor-nesw-resize" data-handle="ne"></div>
                    <div class="crop-handle bottom-0 left-0 -translate-x-1/2 translate-y-1/2 cursor-nesw-resize" data-handle="sw"></div>
                    <div class="crop-handle bottom-0 right-0 translate-x-1/2 translate-y-1/2 cursor-nwse-resize" data-handle="se"></div>
                </div>

                <div id="p0" class="p-handle" data-idx="0"></div>
                <div id="p1" class="p-handle" data-idx="1"></div>
                <div id="p2" class="p-handle" data-idx="2"></div>
                <div id="p3" class="p-handle" data-idx="3"></div>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const cropBox = document.getElementById('cropBox');
        
        let img = new Image();
        let historyStack = [];
        let activeTool = null;
        let originalFileSizeBytes = 0;
        let currentCompressionQuality = 0.9;

        let corners = [{x:0,y:0}, {x:0,y:0}, {x:0,y:0}, {x:0,y:0}];
        const pHandles = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3')];

        // --- Helper: Format Bytes Utility ---
        function formatBytes(bytes) {
            if (bytes === 0) return '0 KB';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Estimates current active base64 string footprint sizing
        function calculateCurrentSize() {
            const dataUrl = canvas.toDataURL('image/jpeg', currentCompressionQuality);
            const head = dataUrl.indexOf(',') + 1;
            const bytes = Math.round((dataUrl.length - head) * 0.75);
            document.getElementById('currStats').innerText = `${canvas.width} x ${canvas.height} px • ${formatBytes(bytes)}`;
        }

        // --- Undo History Pipeline ---
        function saveHistory() {
            historyStack.push(canvas.toDataURL());
            document.getElementById('btnUndo').disabled = false;
        }

        document.getElementById('btnUndo').addEventListener('click', () => {
            if (historyStack.length === 0) return;
            const previousStateUrl = historyStack.pop();
            
            let tempImg = new Image();
            tempImg.src = previousStateUrl;
            tempImg.onload = () => {
                canvas.width = tempImg.width;
                canvas.height = tempImg.height;
                ctx.drawImage(tempImg, 0, 0);
                calculateCurrentSize();
                resetToolStates();
            };
            if(historyStack.length === 0) document.getElementById('btnUndo').disabled = true;
        });

        // --- File Reader Process ---
        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                originalFileSizeBytes = file.size;
                const reader = new FileReader();
                reader.onload = (event) => { img.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        img.onload = () => {
            historyStack = [];
            document.getElementById('btnUndo').disabled = true;
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            document.getElementById('origStats').innerText = `${img.width}x${img.height} px • ${formatBytes(originalFileSizeBytes)}`;
            document.getElementById('resizeW').value = img.width;
            document.getElementById('resizeH').value = img.height;
            calculateCurrentSize();
            resetToolStates();
        };

        function resetToolStates() {
            activeTool = null;
            cropBox.style.display = 'none';
            pHandles.forEach(h => h.style.display = 'none');
            document.getElementById('applyCrop').classList.add('hidden');
            document.getElementById('applyPerspective').classList.add('hidden');
        }

        // --- Geometry Scale Operation ---
        document.getElementById('btnResize').addEventListener('click', () => {
            const w = parseInt(document.getElementById('resizeW').value);
            const h = parseInt(document.getElementById('resizeH').value);
            if (!w || !h) return;

            saveHistory();
            const tempCanvas = copyCanvas();
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(tempCanvas, 0, 0, w, h);
            calculateCurrentSize();
        });

        // --- Mobile-Style Phone Crop Overlay Logic ---
        let cropRect = { top: 0, left: 0, width: 0, height: 0 };
        document.getElementById('toolCrop').addEventListener('click', () => {
            resetToolStates();
            activeTool = 'crop';
            cropBox.style.display = 'block';
            document.getElementById('applyCrop').classList.remove('hidden');

            const displayW = canvas.clientWidth;
            const displayH = canvas.clientHeight;
            // Center viewport allocation
            cropRect = { left: displayW*0.1, top: displayH*0.1, width: displayW*0.8, height: displayH*0.8 };
            renderCropUI();
        });

        function renderCropUI() {
            cropBox.style.left = cropRect.left + 'px';
            cropBox.style.top = cropRect.top + 'px';
            cropBox.style.width = cropRect.width + 'px';
            cropBox.style.height = cropRect.height + 'px';
        }

        // Move box around viewport canvas grid
        cropBox.addEventListener('mousedown', (e) => {
            if (e.target !== cropBox) return;
            let startX = e.clientX; let startY = e.clientY;
            let initLeft = cropRect.left; let initTop = cropRect.top;

            function move(ev) {
                cropRect.left = Math.max(0, Math.min(canvas.clientWidth - cropRect.width, initLeft + (ev.clientX - startX)));
                cropRect.top = Math.max(0, Math.min(canvas.clientHeight - cropRect.height, initTop + (ev.clientY - startY)));
                renderCropUI();
            }
            function stop() { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); }
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        });

        // Node handle responsive resizing calculations
        cropBox.querySelectorAll('.crop-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                const type = handle.getAttribute('data-handle');
                let startX = e.clientX; let startY = e.clientY;
                let initRect = { ...cropRect };

                function move(ev) {
                    let dx = ev.clientX - startX; let dy = ev.clientY - startY;

                    if (type === 'se') {
                        cropRect.width = Math.max(30, Math.min(canvas.clientWidth - initRect.left, initRect.width + dx));
                        cropRect.height = Math.max(30, Math.min(canvas.clientHeight - initRect.top, initRect.height + dy));
                    } else if (type === 'sw') {
                        let targetLeft = Math.max(0, initRect.left + dx);
                        cropRect.width = Math.max(30, initRect.width + (initRect.left - targetLeft));
                        cropRect.left = targetLeft;
                        cropRect.height = Math.max(30, Math.min(canvas.clientHeight - initRect.top, initRect.height + dy));
                    } else if (type === 'ne') {
                        let targetTop = Math.max(0, initRect.top + dy);
                        cropRect.height = Math.max(30, initRect.height + (initRect.top - targetTop));
                        cropRect.top = targetTop;
                        cropRect.width = Math.max(30, Math.min(canvas.clientWidth - initRect.left, initRect.width + dx));
                    } else if (type === 'nw') {
                        let targetLeft = Math.max(0, initRect.left + dx);
                        let targetTop = Math.max(0, initRect.top + dy);
                        cropRect.width = Math.max(30, initRect.width + (initRect.left - targetLeft));
                        cropRect.height = Math.max(30, initRect.height + (initRect.top - targetTop));
                        cropRect.left = targetLeft;
                        cropRect.top = targetTop;
                    }
                    renderCropUI();
                }
                function stop() { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
            });
        });

        document.getElementById('applyCrop').addEventListener('click', () => {
            saveHistory();
            const scaleX = canvas.width / canvas.clientWidth;
            const scaleY = canvas.height / canvas.clientHeight;

            const finalX = cropRect.left * scaleX;
            const finalY = cropRect.top * scaleY;
            const finalW = cropRect.width * scaleX;
            const finalH = cropRect.height * scaleY;

            const croppedData = ctx.getImageData(finalX, finalY, finalW, finalH);
            canvas.width = finalW;
            canvas.height = finalH;
            ctx.putImageData(croppedData, 0, 0);
            
            calculateCurrentSize();
            resetToolStates();
        });

        // --- Compression Slider Engine ---
        const compSlider = document.getElementById('compressQuality');
        compSlider.addEventListener('input', (e) => {
            currentCompressionQuality = parseInt(e.target.value) / 100;
            document.getElementById('qualityVal').innerText = `${e.target.value}%`;
        });

        document.getElementById('btnCompress').addEventListener('click', () => {
            saveHistory();
            // Re-draws onto itself compressing visual quality data block 
            const tempImg = new Image();
            tempImg.src = canvas.toDataURL('image/jpeg', currentCompressionQuality);
            tempImg.onload = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(tempImg,0,0);
                calculateCurrentSize();
                alert("Compression applied successfully!");
            };
        });

        // --- Interactive Perspective Warp System ---
        document.getElementById('toolPerspective').addEventListener('click', () => {
            resetToolStates();
            activeTool = 'perspective';
            document.getElementById('applyPerspective').classList.remove('hidden');

            const w = canvas.width; const h = canvas.height;
            corners = [{x: 40, y: 40}, {x: w - 40, y: 40}, {x: w - 40, y: h - 40}, {x: 40, y: h - 40}];
            
            pHandles.forEach(h => h.style.display = 'block');
            renderPerspectiveHandles();
        });

        function renderPerspectiveHandles() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / canvas.width;
            const scaleY = rect.height / canvas.height;

            corners.forEach((c, i) => {
                pHandles[i].style.left = (canvas.offsetLeft + c.x * scaleX) + 'px';
                pHandles[i].style.top = (canvas.offsetTop + c.y * scaleY) + 'px';
            });
        }

        pHandles.forEach((handle) => {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const idx = parseInt(handle.getAttribute('data-idx'));
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                function move(ev) {
                    let targetX = (ev.clientX - rect.left) * scaleX;
                    let targetY = (ev.clientY - rect.top) * scaleY;

                    corners[idx].x = Math.max(0, Math.min(canvas.width, targetX));
                    corners[idx].y = Math.max(0, Math.min(canvas.height, targetY));
                    renderPerspectiveHandles();
                }
                function stop() { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
            });
        });

        document.getElementById('applyPerspective').addEventListener('click', () => {
            saveHistory();
            const w = canvas.width; const h = canvas.height;
            const srcCtx = copyCanvas();
            
            ctx.clearRect(0,0,w,h);
            const imgData = srcCtx.getImageData(0,0,w,h);
            const outImgData = ctx.createImageData(w, h);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let u = x / w; let v = y / h;

                    let topX = corners[0].x + u * (corners[1].x - corners[0].x);
                    let topY = corners[0].y + u * (corners[1].y - corners[0].y);
                    let botX = corners[3].x + u * (corners[2].x - corners[3].x);
                    let botY = corners[3].y + u * (corners[2].y - corners[3].y);

                    let srcX = Math.floor(topX + v * (botX - topX));
                    let srcY = Math.floor(topY + v * (botY - topY));

                    if (srcX >= 0 && srcX < w && srcY >= 0 && srcY < h) {
                        let srcIdx = (srcY * w + srcX) * 4;
                        let outIdx = (y * w + x) * 4;
                        outImgData.data[outIdx] = imgData.data[srcIdx];
                        outImgData.data[outIdx+1] = imgData.data[srcIdx+1];
                        outImgData.data[outIdx+2] = imgData.data[srcIdx+2];
                        outImgData.data[outIdx+3] = imgData.data[srcIdx+3];
                    }
                }
            }
            ctx.putImageData(outImgData, 0, 0);
            calculateCurrentSize();
            resetToolStates();
        });

        // --- Background Processing ---
        document.getElementById('btnRemoveBg').addEventListener('click', () => {
            saveHistory();
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 215 && data[i+1] > 215 && data[i+2] > 215) {
                    data[i+3] = 0; 
                }
            }
            ctx.putImageData(imgData, 0, 0);
            calculateCurrentSize();
        });

        document.getElementById('btnAddBgColor').addEventListener('click', () => {
            saveHistory();
            const bgColor = document.getElementById('bgColor').value;
            const fgCanvas = copyCanvas();
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(fgCanvas.canvas, 0, 0);
            calculateCurrentSize();
        });

        // --- Exporters ---
        function copyCanvas() {
            const tc = document.createElement('canvas');
            tc.width = canvas.width; tc.height = canvas.height;
            tc.getContext('2d').drawImage(canvas, 0, 0);
            return tc.getContext('2d');
        }

        document.getElementById('btnDownload').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'studio-export.jpg';
            link.href = canvas.toDataURL('image/jpeg', currentCompressionQuality);
            link.click();
        });

        document.getElementById('btnPdf').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/jpeg', currentCompressionQuality);
            const pdf = new jsPDF({
                orientation: canvas.width > canvas.height ? 'l' : 'p',
                unit: 'px',
                format: [canvas.width, canvas.height]
            });
            pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
            pdf.save('studio-document.pdf');
        });

        window.addEventListener('resize', () => {
            if (activeTool === 'perspective') renderPerspectiveHandles();
        });
    </script>
</body>
</html>
